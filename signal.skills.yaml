- id: scout-market
  namespace: scout
  audience: pm
  default_mode: lightweight
  tools:
  - Read
  - Write
  - WebSearch
  inputs:
  - Topic
  outputs:
  - Signal
  description: 'Size the addressable market and rank segments by fit. Use developer headcount for tooling segments, dollar
    TAM for platform/enterprise segments -- do not mix units in the same table. Scoring: pain severity, WTP, accessibility
    on 1-10 scale, equal weights, composite = average. Composite rank = fit score + (10 - GTM difficulty). Recommend beachhead
    segment with rationale. Stock roles: Strategy (TAM/SAM/SOM), PM (segment fit), GTM (go-to-market difficulty).

    '
  artifact: simulations/scout/market/{topic}-market-{date}.md
  spec: simulations/draft/specs/signal-scout-2026-03-14.md#scout-market
