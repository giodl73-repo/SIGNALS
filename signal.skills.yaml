  golden: simulations/quest/golden/discover-competitors-golden-simplified-2026-03-15.md
  rubric: simulations/quest/rubrics/scout-competitors-rubric-v2-2026-03-14.md
  quest_status: GOLDEN (Round 2, score 100)
  description: 'Competitive landscape analysis with inertia-first framing. Use --focus
    to expand scope: --focus market (sizing + segments), --focus positioning (framework
    + category). Default: named competitors + inertia analysis. THE PRIMARY COMPETITOR:
    always assess status quo first, always HIGH threat. AMEND: 3 adjustments to shift
    the analysis.'
  artifact: simulations/scout/competitors/{topic}-competitors-{date}.md
  spec: simulations/draft/specs/signal-scout-2026-03-14.md#scout-competitors
  param_inline:
    focus:
      market: 'After the competitive brief, add: TAM/SAM/SOM estimate, top 3 segments
        ranked by fit score, market growth rate (CAGR if available), and whether market
        size justifies building.'
      positioning: 'After the competitive brief, add: positioning framework (category,
        frame of reference, differentiator), category creation opportunity assessment,
        and 2-3 candidate positioning statements.'
- id: discover-feasibility
  namespace: discover
  audience: pm+architect
  default_mode: lightweight
  tools:
  - Read
  - Write
  - Glob
  - Grep
  inputs:
  - Topic
  outputs:
  - Signal
  description: 'Technical feasibility assessment. Use --focus for additional discovery
    dimensions: --focus compliance (regulatory constraints), --focus stakeholders
    (power/interest map), --focus requirements (extraction + ambiguity flags), --focus
    naming (validation + trademark), --focus size (effort estimation). Default: team/timeline/complexity
    feasibility with traffic-light ratings.'
  artifact: simulations/scout/feasibility/{topic}-feasibility-{date}.md
  spec: simulations/draft/specs/signal-scout-2026-03-14.md#scout-feasibility
  golden: simulations/quest/golden/discover-feasibility-golden-simplified-2026-03-15.md
  quest_status: GOLDEN (synced 2026-03-17)
  param_inline:
    focus:
      compliance: 'After feasibility, add: regulatory framework scan, applicable standards
        (GDPR, SOC2, HIPAA etc.), compliance timeline impact, and show-stopper risks.'
      stakeholders: 'After feasibility, add: stakeholder power/interest map, key decision
        makers, blockers, and recommended engagement sequence.'
      requirements: 'After feasibility, add: full requirements extraction with ambiguity
        flags, compliance-scope boundary, and missing information list.'
      naming: 'After feasibility, add: name validation across trademark, domain, brand
        fit, and competitor namespace. Produce 3 candidate names with risk scores.'
      size: 'After feasibility, add: effort sizing (S/M/L/XL), team composition signal,
        timeline range (sprint estimate), confidence level.'
- id: discover-risk
  namespace: discover
  param_set: standard
  tools:
  - Read
  - Write
  - Glob
  artifact: simulations/scout/risk/{topic}-risk-{date}.md
  description: 'Risk register for a feature or decision. What could go wrong? Lists
    top risks across dimensions: technical (implementation unknowns), market (adoption
    risk), compliance (regulatory exposure), dependency (third-party, platform), timeline
    (schedule risk). Each risk gets: severity (HIGH/MEDIUM/LOW), likelihood, mitigation.
    The inertia risk is always listed first -- the risk that the status quo was good
    enough and you built the wrong thing. AMEND: focus on specific risk dimension,
    adjust severity thresholds.'
  golden: simulations/quest/golden/discover-risk-golden-2026-03-16.md
  rubric: simulations/quest/rubrics/scout-risk-rubric-v20-2026-03-16.md
  quest_status: GOLDEN (Round 20, score 188)
- id: discover-inertia
  namespace: discover
  param_set: standard
  tools:
  - Read
  - Write
  - Glob
  artifact: simulations/scout/inertia/{topic}-inertia-{date}.md
  description: 'Deep analysis of the inertia competitor -- the option to do nothing.
    Why would teams keep their current workaround instead of adopting this feature?
    Maps: current workaround in detail, switching cost (time, training, disruption),
    inertia threat score (always HIGH by default), specific conditions under which
    inertia loses. This is the most important analysis in Signal. Every feature decision
    must answer: why does inertia lose? If you cannot answer that, stop. AMEND: quantify
    switching costs, identify specific workaround failure modes.'
  golden: simulations/quest/golden/discover-inertia-golden-2026-03-16.md
  rubric: simulations/quest/rubrics/scout-inertia-rubric-v21-2026-03-16.md
  quest_status: GOLDEN (Round 20, score 290)
