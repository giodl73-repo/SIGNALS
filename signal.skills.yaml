  description: 'State what you believe and what would change your mind. Entry point
    to a prove investigation. A hypothesis has: a claim (what you believe), a falsification
    condition (what evidence would prove it wrong), a confidence level (0-100), and
    a list of experiments that will test it. The hypothesis is a commitment -- you
    cannot move the goalposts after seeing results.

    '
  artifact: simulations/prove/investigations/{topic}-hypothesis-{date}.md
  spec: simulations/draft/specs/signal-prove-2026-03-14.md#prove-hypothesis
  golden: simulations/quest/golden/discover-hypothesis-golden-2026-03-14.md
