- id: scout-competitors
  namespace: scout
  audience: pm
  default_mode: lightweight
  tools:
  - Read
  - Write
  - Glob
  - Grep
  - WebSearch
  inputs:
  - Topic
  outputs:
  - Signal
  golden: simulations/quest/golden/scout-competitors-golden-simplified-2026-03-15.md
  rubric: simulations/quest/rubrics/scout-competitors-rubric-v2-2026-03-14.md
  quest_status: GOLDEN (Round 2, score 100)
  description: 'Auto-detect domain from repo context. Do not prompt unless context absent. THE PRIMARY COMPETITOR: assess
    "none / status quo" first -- why do teams do nothing? Score threat always HIGH. Inertia is the primary competitor. Named
    competitors (5-8): feature overlap, positioning, technical moat, distribution, overall threat (HIGH/MEDIUM/LOW each).
    Use WebSearch to verify at least one claim per major competitor, cite source inline. FINDINGS as a brief: (1) The Primary
    Competitor -- why inertia is the real threat, (2) The Whitespace -- what no competitor owns, (3) The Table Stakes -- what
    any entrant must have, (4) The Competitive Matrix -- supporting evidence, (5) --mode risk -- cost of not acting, for exec
    audiences. AMEND: 3 specific adjustments each with what changes in the output.

    '
  artifact: simulations/scout/competitors/{topic}-competitors-{date}.md
  spec: simulations/draft/specs/signal-scout-2026-03-14.md#scout-competitors
