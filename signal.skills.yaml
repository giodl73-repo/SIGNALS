- id: scout-risk
  namespace: scout
  param_set: standard
  tools:
  - Read
  - Write
  - Glob
  artifact: simulations/scout/risk/{topic}-risk-{date}.md
  description: 'Risk register for a feature or decision. What could go wrong? Lists top risks across dimensions: technical
    (implementation unknowns), market (adoption risk), compliance (regulatory exposure), dependency (third-party, platform),
    timeline (schedule risk). Each risk gets: severity (HIGH/MEDIUM/LOW), likelihood, mitigation. The inertia risk is always
    listed first -- the risk that the status quo was good enough and you built the wrong thing. AMEND: focus on specific risk
    dimension, adjust severity thresholds.'
  golden: simulations/quest/golden/scout-risk-golden-2026-03-16.md
  rubric: simulations/quest/rubrics/scout-risk-rubric-v20-2026-03-16.md
  quest_status: GOLDEN (Round 20, score 188)
- id: scout-inertia
  namespace: scout
  param_set: standard
  tools:
  - Read
  - Write
  - Glob
  artifact: simulations/scout/inertia/{topic}-inertia-{date}.md
  description: 'Deep analysis of the inertia competitor -- the option to do nothing. Why would teams keep their current workaround
    instead of adopting this feature? Maps: current workaround in detail, switching cost (time, training, disruption), inertia
    threat score (always HIGH by default), specific conditions under which inertia loses. This is the most important analysis
    in Signal. Every feature decision must answer: why does inertia lose? If you cannot answer that, stop. AMEND: quantify
    switching costs, identify specific workaround failure modes.'
  golden: simulations/quest/golden/scout-inertia-golden-2026-03-16.md
  rubric: simulations/quest/rubrics/scout-inertia-rubric-v21-2026-03-16.md
  quest_status: GOLDEN (Round 20, score 290)
- id: scout-size
  namespace: scout
  param_set: standard
  tools:
  - Read
  - Write
  - Glob
  artifact: simulations/scout/size/{topic}-size-{date}.md
  description: 'Feature sizing and effort estimation. Estimates: surface area (how many integration points), implementation
    complexity (LOW/MEDIUM/HIGH/XL), team-size signal (how many specialists needed), timeline signal (sprint range estimate),
    confidence level. Does NOT produce a project plan -- produces a sizing signal that feeds program-plan. Inertia check:
    always compare against the cost of maintaining the current workaround. AMEND: adjust confidence thresholds, focus on specific
    complexity dimension.'
