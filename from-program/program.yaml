# ─── State ──────────────────────────────────────────────────
state:
  fields:
    - { name: initialized, type: boolean, default: false }
    - { name: domain_count, type: number, default: 0 }
    - { name: series_count, type: number, default: 0 }
    - { name: scenario_count, type: number, default: 0 }
    - { name: finding_count, type: number, default: 0 }
    - { name: dcr_count, type: number, default: 0 }
    - { name: wired_count, type: number, default: 0 }
  version: 1
