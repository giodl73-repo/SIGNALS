workers:
- name: signal-lifecycle
  description: '4-phase lifecycle (setup/execute/findings/amend) shared by all skills. Lightweight mode merges execute+findings,
    makes amend optional. Full mode runs all 4 phases explicitly.

    '
  commands:
  - scout
  - draft
  - review
  - flow
  - trace
  - prove
  - listen
  - program
  - topic
  tier: T1
- name: artifact-writer
  description: 'Writes signal artifacts with standard frontmatter (skill, topic, item, date, skill_version, input). Enforces
    topic-item-date naming convention. Supports --json sidecar flag.

    '
  commands:
  - scout
  - draft
  - review
  - flow
  - trace
  - prove
  - listen
  - topic
  tier: T1
- name: topic-scanner
  description: 'Discovers all signals for a topic by globbing simulations/**/topic-* files. Computes coverage against strategy.md
    planned signals.

    '
  commands:
  - topic
  tier: T1
- name: skill-tracer
  description: 'Executes the trace-skill hand-compilation protocol. Reads the skill spec, runs each lifecycle phase against
    the test input, writes the hand-compiled artifact, and produces a verdict with any findings.

    '
  commands:
  - trace-skill
  tier: T1
- name: quest-engine
  description: 'Runs the quest loop: variate -> score -> extract -> evolve rubric -> repeat until dual convergence. Tracks
    rounds, rubric versions, and excellence patterns. Produces a convergence report with the golden prompt and the final rubric
    that defines what golden means for this skill.

    '
  commands:
  - quest-golden
  tier: T1
roles:
- name: signal-pm
  tier: root
  scope: workspace
  archetype: experiential
  orientation:
    frame: 'Sees the feature decision as a risk reduction problem. Every signal gathered is one less unknown at commit time.

      '
    serves: 'Product managers who need to justify feature investments with evidence and anticipate customer reactions before
      ship.

      '
  lens:
    verify:
    - Is the competitive landscape signal gathered before drafting?
    - Does the requirements signal confirm we are building the right thing?
    - Does the listen signal predict adoption or friction before ship?
    simplify:
    - Scout and listen are lightweight -- PMs want speed to insight
    - The topic story is the PM deliverable, not the individual signals
  expertise:
    depth: 'Feature prioritization, market analysis, customer development, GTM strategy, and product positioning.

      '
    relevance: 'PM signals drive scout and listen. Without them the topic story lacks market and customer grounding.

      '
- name: signal-dev
  tier: root
  scope: workspace
  archetype: craft
  orientation:
    frame: 'Sees every feature as a flow of data and operations through the system. Hand-compilation is the gold standard.

      '
    serves: 'Developers who implement features and need validated expected outputs before writing a line of code.

      '
  lens:
    verify:
    - Is the state signal covering all starting states and transitions?
    - Does the flow signal identify all domain process exceptions?
    - Are trace signals covering the actual system path, not the happy path?
    simplify:
    - Flow and trace are full by default -- developers need all 4 phases
    - A trace that skips a system boundary is not a trace
  expertise:
    depth: 'Dataverse plugin pipeline, Power Platform connectors, backend service integration, state machine design, hand-compilation
      methodology.

      '
    relevance: 'Developer signals drive flow and trace. The quality of hand-compiled expected outputs determines the quality
      of implementation.

      '
state:
  fields:
  - name: initialized
    type: boolean
    default: false
  - name: topics_registered
    type: number
    default: 0
  - name: signals_produced
    type: number
    default: 0
  version: 1
