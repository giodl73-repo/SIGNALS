version: 1
plugin: signal
model: claude-sonnet-4-6
workspace: signal
target_platform: claude-code
agents:
  emit: true
  model: claude-sonnet-4-6
  orchestration: false
tiers:
- id: root
  path: .claude/
  parent: null
parameters:
  definitions:
  - name: depth
    type: enum
    values:
    - quick
    - standard
    - deep
    default: standard
    description: Controls thoroughness. quick=fast scan, standard=thorough, deep=exhaustive adversarial.
    inject: block
    block_text: 'depth: {value}

      # quick   -> fast scan, 5+ findings, prioritize obvious issues

      # standard -> thorough, 15+ findings, full coverage (default)

      # deep    -> exhaustive adversarial audit, 25+ findings, treat missing as failure

      '
  - name: confidence
    type: enum
    values:
    - low
    - standard
    - strict
    default: standard
    description: Evidence threshold per finding. strict=cite specific line/section or omit.
    inject: block
    block_text: 'confidence: {value}

      # low    -> include findings without citation

      # standard -> cite source section for each finding (default)

      # strict  -> only include findings with quotable specific evidence

      '
  - name: for
    type: enum
    values:
    - pm
    - engineer
    - exec
    - team
    description: Audience calibration. Shifts salience and vocabulary to match role perspective.
    inject: block
    block_text: 'for: {value}

      # pm       -> adoption, user value, competitive positioning

      # engineer -> implementation, edge cases, technical debt

      # exec     -> risk, cost, strategic alignment

      # team     -> shared understanding, action items, ownership

      '
  - name: iterations
    type: int
    min: 1
    max: 3
    default: 1
    description: Run the skill N times independently. Marginal finding rate drops ~50% per pass.
    inject: block
    block_text: 'iterations: {value}  # run {value}x independently, aggregate findings, mark new vs confirmed

      '
  param_sets:
  - name: lean
    params:
    - depth
    applies_to:
    - simulate
    - govern
    - quest
    rationale: Structure-focused skills where audience/confidence don't change what's found
  - name: standard
    params:
    - depth
    - for
    applies_to:
    - discover
    - specify
    rationale: Discovery/planning skills where audience changes which signals matter
  - name: analysis
    params:
    - depth
    - confidence
    applies_to:
    - simulate
    rationale: Contract/state verification -- evidence threshold matters, audience doesn't
  - name: full
    params:
    - depth
    - confidence
    - for
    - iterations
    applies_to:
    - validate
    rationale: Research-grade skills where all quality axes are meaningful
commands:
- name: discover
  description: 'Discover group -- market context + evidence gathering. Combines all scout (market, competition, feasibility,
    naming, compliance, stakeholders, positioning, requirements) and prove (hypothesis, websearch, intelligence, prototype,
    analysis, interview, synthesize, publish, topic, program) skills.


    /discover-competitors     -> inertia-first competitive analysis

    /discover-feasibility     -> traffic-light technical feasibility

    /discover-market          -> market sizing and segment ranking

    /discover-naming          -> name generation with multi-persona scoring

    /discover-compliance      -> regulatory constraint scan

    /discover-stakeholders    -> power/interest grid with veto risk

    /discover-positioning     -> per-audience positioning statements

    /discover-requirements    -> MoSCoW requirements extraction

    /discover-hypothesis      -> hypothesis framing with falsification

    /discover-websearch       -> web evidence with quoted sources

    /discover-intelligence    -> internal source evidence search

    /discover-prototype       -> smallest-possible prototype

    /discover-analysis        -> data pattern analysis

    /discover-interview       -> persona stakeholder simulation

    /discover-synthesize      -> answer-first evidence synthesis

    /discover-publish         -> investigation write-up as paper

    /discover-topic           -> full prove evidence campaign

    /discover-program         -> open-ended research orchestrator


    inferAggregators: true

    '
  tier: T1
  tools:
  - Read
  - Write
  - Glob
  - Grep
  - WebSearch
  - WebFetch
  inputs:
  - Topic
  - Strategy
  outputs:
  - Signal
  dependencies: []
  param_set: standard
  body: "Research and evidence before you commit. Covers competitive analysis, feasibility, market sizing, risk, compliance,\
    \ hypothesis testing, and intelligence gathering.\n\nUsage: /discover-<skill> <topic>  (NOT /discover <skill> <topic>)\n\
    \nSub-skills:\n  /discover-competitors <topic>  → competitive landscape + inertia analysis\n  /discover-inertia <topic>\
    \      → deep dive: why would teams do nothing?\n  /discover-feasibility <topic>  → technical feasibility + team/timeline\n\
    \  /discover-market <topic>       → market sizing + segment analysis\n  /discover-risk <topic>         → risk register\
    \ across 5 dimensions\n  /discover-compliance <topic>   → regulatory and policy constraints\n  /discover-size <topic>\
    \         → effort sizing and complexity estimate\n  /discover-naming <topic>       → name validation + trademark search\n\
    \  /discover-positioning <topic>  → positioning framework + category\n  /discover-stakeholders <topic> → stakeholder map\
    \ + power/interest\n  /discover-requirements <topic> → requirements extraction\n  /discover-hypothesis <topic>   → hypothesis\
    \ + falsification conditions\n  /discover-websearch <topic>    → web evidence gathering\n  /discover-analysis <topic>\
    \     → data and pattern analysis\n  /discover-intelligence <topic> → competitive intelligence synthesis\n  /discover-synthesize\
    \ <topic>   → evidence synthesis + verdict\n  /discover-prototype <topic>    → prototype evaluation\n  /discover-interview\
    \ <topic>    → interview simulation\n\nStart here: /discover-competitors <topic> and /discover-inertia <topic>"
