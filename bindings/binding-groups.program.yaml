- name: quest
  description: 'Quest namespace -- prompt quality tooling. Find golden prompts through systematic variation, scoring, and
    rubric convergence.


    /quest-rubric    -> define what good output looks like for a skill

    /quest-variate   -> generate N prompt variations for comparison

    /quest-score     -> score skill outputs against a rubric

    /quest-golden    -> full loop: variate -> score -> evolve -> converge


    '
  tier: T1
  tools:
  - Read
  - Write
  - Glob
  - Grep
  inputs:
  - SkillSpec
  outputs:
  - Rubric
  - QuestScorecard
  dependencies: []
  param_set: lean
- name: quest-rubric
  description: 'Define what good output looks like for a skill. Given a skill spec and sample outputs, produce a scoring rubric:
    a ranked list of criteria (C-01, C-02...) each with a pass condition, weight, and category (correctness, depth, format,
    coverage). The rubric is the objective function for /quest:golden. Start with 3-5 essential criteria; the rubric grows
    as /quest:golden discovers excellence patterns.'
  tier: T1
  tools:
  - Read
  - Write
  - Glob
  inputs:
  - SkillSpec
  - TraceOutput
  outputs:
  - Rubric
  dependencies: []
  body_file: signals/quest-rubric.md
  param_set: lean
- name: quest-variate
  description: Generate N prompt variations of a skill body for comparison. Given a skill description and variation axes (role
    sequence, output format, lifecycle emphasis, stock role selection, phrasing), produce N distinct prompt formulations of
    the same skill. Each variation is a complete, runnable skill body -- not a diff. Variation axes are independent; combinations
    are intentional. Default N=5.
  tier: T1
  tools:
  - Read
  - Write
  inputs:
  - SkillSpec
  outputs:
  - SkillVariation
  dependencies: []
  body_file: signals/quest-variate.md
  param_set: lean
- name: quest-score
  description: 'Score a set of skill outputs against a rubric. Given outputs from N skill runs and a rubric file, evaluate
    each output against every criterion. Produce: per-criterion pass/fail per output, composite score per output, ranked leaderboard,
    excellence signals (outputs scoring unusually high on specific criteria), and failure patterns (criteria that fail consistently
    across all outputs -- rubric gap or skill gap?).'
  tier: T1
  tools:
  - Read
  - Write
  - Glob
  inputs:
  - SkillVariation
  - Rubric
  - TraceOutput
  outputs:
  - QuestScorecard
  dependencies: []
  body_file: signals/quest-score.md
  param_set: lean
- name: quest-golden
  description: 'Find the golden prompt for a skill through systematic variation and scoring. Full loop: (1) load rubric or
    call quest-rubric to create one, (2) call quest-variate to generate N variations, (3) call quest-score to rank them, (4)
    identify excellence signals -- what made the top output better?, (5) extract the pattern, propose a rubric criterion update,
    (6) apply the update, (7) iterate from step 2 until dual convergence: all scenarios pass AND no new excellence patterns
    emerge across 2 consecutive rounds. Write the converged prompt as the skill body. Dual convergence = the golden prompt.'
  tier: T1
  tools:
  - Read
  - Write
  - Glob
  - Grep
  inputs:
  - SkillSpec
  - TraceInput
  outputs:
  - TraceOutput
  - SkillFinding
  dependencies: []
  body_file: signals/quest-golden.md
  param_set: lean
