version: 1
plugin: signal
model: claude-sonnet-4-6
workspace: signal
target_platform: claude-code
agents:
  emit: true
  model: claude-sonnet-4-6
  orchestration: false
tiers:
- id: root
  path: .claude/
  parent: null
parameters:
  definitions:
  - name: depth
    type: enum
    values:
    - quick
    - standard
    - deep
    default: standard
    description: Controls thoroughness. quick=fast scan, standard=thorough, deep=exhaustive adversarial.
    inject: block
    block_text: 'depth: {value}

      # quick   -> fast scan, 5+ findings, prioritize obvious issues

      # standard -> thorough, 15+ findings, full coverage (default)

      # deep    -> exhaustive adversarial audit, 25+ findings, treat missing as failure

      '
  - name: confidence
    type: enum
    values:
    - low
    - standard
    - strict
    default: standard
    description: Evidence threshold per finding. strict=cite specific line/section or omit.
    inject: block
    block_text: 'confidence: {value}

      # low    -> include findings without citation

      # standard -> cite source section for each finding (default)

      # strict  -> only include findings with quotable specific evidence

      '
  - name: for
    type: enum
    values:
    - pm
    - engineer
    - exec
    - team
    description: Audience calibration. Shifts salience and vocabulary to match role perspective.
    inject: block
    block_text: 'for: {value}

      # pm       -> adoption, user value, competitive positioning

      # engineer -> implementation, edge cases, technical debt

      # exec     -> risk, cost, strategic alignment

      # team     -> shared understanding, action items, ownership

      '
  - name: iterations
    type: int
    min: 1
    max: 3
    default: 1
    description: Run the skill N times independently. Marginal finding rate drops ~50% per pass.
    inject: block
    block_text: 'iterations: {value}  # run {value}x independently, aggregate findings, mark new vs confirmed

      '
  param_sets:
  - name: lean
    params:
    - depth
    applies_to:
    - flow
    - topic
    - quest
    rationale: Structure-focused skills where audience/confidence don't change what's found
  - name: standard
    params:
    - depth
    - for
    applies_to:
    - scout
    - draft
    - program
    rationale: Discovery/planning skills where audience changes which signals matter
  - name: analysis
    params:
    - depth
    - confidence
    applies_to:
    - trace
    rationale: Contract/state verification -- evidence threshold matters, audience doesn't
  - name: full
    params:
    - depth
    - confidence
    - for
    - iterations
    applies_to:
    - review
    - prove
    - listen
    rationale: Research-grade skills where all quality axes are meaningful
commands:
