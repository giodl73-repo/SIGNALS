version: 1
plugin: signal
model: claude-sonnet-4-6
workspace: signal
target_platform: claude-code

# Signal -- know what you know before you commit.
# Every artifact is a signal toward the topic's design commit.
# 9 namespaces, 48 skills, topic-item-date artifact naming.

agents:
  emit: true
  model: claude-sonnet-4-6
  orchestration: false

tiers:
  - id: root
    path: .claude/
    parent: null

commands:
  - name: scout
    description: >
      PM proves the idea. Market positioning, competitive landscape, feasibility,
      naming validation, compliance scan, market sizing, stakeholder alignment,
      positioning pitch, and requirements validation. Lightweight default.
    tier: T1
    tools: [Read, Write, Glob, Grep, WebSearch, WebFetch]
    inputs: [Topic, Strategy]
    outputs: [Signal]
    dependencies: []

  - name: draft
    description: >
      Author writes the design. Guided authoring of specifications, proposals
      with trade-off analysis, and pitch deck narratives. Lightweight default.
    tier: T1
    tools: [Read, Write, Edit, Glob]
    inputs: [Topic, Strategy]
    outputs: [Signal]
    dependencies: []

  - name: review
    description: >
      Team validates the design. Expert and discipline review of specs and code.
      Persona walkthrough for usability. 12-customer-persona evaluation for adoption.
      Full default.
    tier: T1
    tools: [Read, Write, Glob, Grep]
    inputs: [Topic, Signal]
    outputs: [Signal]
    dependencies: []

  - name: flow
    description: >
      Domain developer simulates the process. Business lifecycle flows, agent
      conversations, automation triggers, data pipelines, integrations, throttle
      limits, and resilience under failure. Full default.
    tier: T1
    tools: [Read, Write, Glob, Grep]
    inputs: [Topic, Strategy]
    outputs: [Signal]
    dependencies: []

  - name: trace
    description: >
      System developer simulates the platform. Request tracing, state validation,
      contract testing, component trees, deployment impact, migration safety, and
      permission walk-through. Full default.
    tier: T1
    tools: [Read, Write, Glob, Grep]
    inputs: [Topic, Strategy]
    outputs: [Signal]
    dependencies: []

  - name: prove
    description: >
      Prove what you believe. Hypothesis-first investigation decomposed into
      approachable steps -- state, research, prototype, analyze, interview,
      synthesize, publish. Full default.
    tier: T1
    tools: [Read, Write, Glob, Grep, WebSearch, WebFetch]
    inputs: [Topic, Strategy]
    outputs: [Signal]
    dependencies: []

  - name: listen
    description: >
      Team simulates post-ship feedback. Customer reactions, support ticket
      forecasts, and adoption curve simulation before the feature ships.
      Lightweight default.
    tier: T1
    tools: [Read, Write, Glob]
    inputs: [Topic, Signal]
    outputs: [Signal]
    dependencies: []

  - name: program
    description: >
      Lead orchestrates all. Sequences scout -> draft -> review -> flow -> trace ->
      listen into a staged program plan with gates and topic tracking. Full default.
    tier: T1
    tools: [Read, Write, Edit, Glob]
    inputs: [Topic, Strategy]
    outputs: [ProgramPlan]
    dependencies: []

  - name: topic
    description: >
      Anyone manages the topic narrative. Register topics, plan signal strategy,
      check coverage status, write shareable reports, synthesize the story, and
      capture the echo. Lightweight default.
    tier: T1
    tools: [Read, Write, Glob]
    inputs: [Topic]
    outputs: [Topic, Signal]
    dependencies: []

  - name: trace-skill
    description: >
      Hand-compile a skill execution before building it. Given a skill spec and
      a test invocation, trace the 4-phase lifecycle (setup, execute, findings,
      amend) step by step -- producing the expected artifact as if the skill had
      run. Read the spec. Simulate setup (auto-detect from repo context). Run
      each stock role through their lens. Synthesize findings into the artifact.
      List 3 amend options. Deliver a verdict: useful or needs redesign?
      The hand-compiled artifact becomes the scenario baseline for testing.
      Findings feed back to the skill spec before implementation.
    tier: T1
    tools: [Read, Write, Glob, Grep]
    inputs: [SkillSpec, TraceInput]
    outputs: [TraceOutput, SkillFinding]
    dependencies: []

  - name: quest-rubric
    description: >
      Define what good output looks like for a skill. Given a skill spec and
      sample outputs, produce a scoring rubric: a ranked list of criteria
      (C-01, C-02...) each with a pass condition, weight, and category
      (correctness, depth, format, coverage). The rubric is the objective
      function for /quest:golden. Start with 3-5 essential criteria; the rubric
      grows as /quest:golden discovers excellence patterns.
    tier: T1
    tools: [Read, Write, Glob]
    inputs: [SkillSpec, TraceOutput]
    outputs: [Rubric]
    dependencies: []

  - name: quest-variate
    description: >
      Generate N prompt variations of a skill body for comparison. Given a
      skill description and variation axes (role sequence, output format,
      lifecycle emphasis, stock role selection, phrasing), produce N distinct
      prompt formulations of the same skill. Each variation is a complete,
      runnable skill body -- not a diff. Variation axes are independent;
      combinations are intentional. Default N=5.
    tier: T1
    tools: [Read, Write]
    inputs: [SkillSpec]
    outputs: [SkillVariation]
    dependencies: []

  - name: quest-score
    description: >
      Score a set of skill outputs against a rubric. Given outputs from N skill
      runs and a rubric file, evaluate each output against every criterion.
      Produce: per-criterion pass/fail per output, composite score per output,
      ranked leaderboard, excellence signals (outputs scoring unusually high on
      specific criteria), and failure patterns (criteria that fail consistently
      across all outputs -- rubric gap or skill gap?).
    tier: T1
    tools: [Read, Write, Glob]
    inputs: [SkillVariation, Rubric, TraceOutput]
    outputs: [QuestScorecard]
    dependencies: []

  - name: quest-golden
    description: >
      Find the golden prompt for a skill through systematic variation and
      scoring. Full loop: (1) load rubric or call quest-rubric to create one,
      (2) call quest-variate to generate N variations, (3) call quest-score to
      rank them, (4) identify excellence signals -- what made the top output
      better?, (5) extract the pattern, propose a rubric criterion update,
      (6) apply the update, (7) iterate from step 2 until dual convergence:
      all scenarios pass AND no new excellence patterns emerge across 2
      consecutive rounds. Write the converged prompt as the skill body.
      Dual convergence = the golden prompt.
    tier: T1
    tools: [Read, Write, Glob, Grep]
    inputs: [SkillSpec, TraceInput]
    outputs: [TraceOutput, SkillFinding]
    dependencies: []

entities:
  - name: Topic
    fields:
      - { name: name, type: string }
      - { name: description, type: string }
      - { name: started, type: date }
      - { name: status, type: string, default: active }
      - { name: target_outcome, type: string }

  - name: Strategy
    fields:
      - { name: topic, type: string }
      - { name: essential_signals, type: array }
      - { name: recommended_signals, type: array }
      - { name: optional_signals, type: array }

  - name: Signal
    fields:
      - { name: topic, type: string }
      - { name: item, type: string }
      - { name: skill, type: string }
      - { name: date, type: date }
      - { name: skill_version, type: string }
      - { name: input, type: string }
      - { name: namespace, type: string }

  - name: SkillSpec
    fields:
      - { name: name, type: string }
      - { name: namespace, type: string }
      - { name: description, type: string }
      - { name: roles, type: array }
      - { name: lifecycle, type: string }
      - { name: artifact_pattern, type: string }

  - name: TraceInput
    fields:
      - { name: skill, type: string }
      - { name: invocation, type: string }
      - { name: repo_context, type: string }
      - { name: scenario, type: string }

  - name: TraceOutput
    fields:
      - { name: skill, type: string }
      - { name: scenario, type: string }
      - { name: setup_result, type: string }
      - { name: execute_result, type: string }
      - { name: artifact, type: string }
      - { name: verdict, type: string }

  - name: SkillFinding
    fields:
      - { name: skill, type: string }
      - { name: severity, type: string }
      - { name: finding, type: string }
      - { name: recommendation, type: string }

  - name: ProgramPlan
    fields:
      - { name: topic, type: string }
      - { name: stages, type: array }
      - { name: created_at, type: date }
      - { name: status, type: string, default: draft }

workers:
  - name: signal-lifecycle
    description: >
      4-phase lifecycle (setup/execute/findings/amend) shared by all skills.
      Lightweight mode merges execute+findings, makes amend optional.
      Full mode runs all 4 phases explicitly.
    commands: [scout, draft, review, flow, trace, prove, listen, program, topic]
    tier: T1

  - name: artifact-writer
    description: >
      Writes signal artifacts with standard frontmatter (skill, topic, item,
      date, skill_version, input). Enforces topic-item-date naming convention.
      Supports --json sidecar flag.
    commands: [scout, draft, review, flow, trace, prove, listen, topic]
    tier: T1

  - name: topic-scanner
    description: >
      Discovers all signals for a topic by globbing simulations/**/topic-*
      files. Computes coverage against strategy.md planned signals.
    commands: [topic]
    tier: T1

  - name: skill-tracer
    description: >
      Executes the trace-skill hand-compilation protocol. Reads the skill spec,
      runs each lifecycle phase against the test input, writes the hand-compiled
      artifact, and produces a verdict with any findings.
    commands: [trace-skill]
    tier: T1

  - name: quest-engine
    description: >
      Runs the quest loop: variate -> score -> extract -> evolve rubric ->
      repeat until dual convergence. Tracks rounds, rubric versions, and
      excellence patterns. Produces a convergence report with the golden prompt
      and the final rubric that defines what golden means for this skill.
    commands: [quest-golden]
    tier: T1

roles:
  - name: signal-pm
    tier: root
    scope: workspace
    archetype: experiential
    orientation:
      frame: >
        Sees the feature decision as a risk reduction problem. Every signal
        gathered is one less unknown at commit time.
      serves: >
        Product managers who need to justify feature investments with evidence
        and anticipate customer reactions before ship.
    lens:
      verify:
        - Is the competitive landscape signal gathered before drafting?
        - Does the requirements signal confirm we are building the right thing?
        - Does the listen signal predict adoption or friction before ship?
      simplify:
        - Scout and listen are lightweight -- PMs want speed to insight
        - The topic story is the PM deliverable, not the individual signals
    expertise:
      depth: >
        Feature prioritization, market analysis, customer development, GTM
        strategy, and product positioning.
      relevance: >
        PM signals drive scout and listen. Without them the topic story
        lacks market and customer grounding.

  - name: signal-dev
    tier: root
    scope: workspace
    archetype: craft
    orientation:
      frame: >
        Sees every feature as a flow of data and operations through the system.
        Hand-compilation is the gold standard.
      serves: >
        Developers who implement features and need validated expected outputs
        before writing a line of code.
    lens:
      verify:
        - Is the state signal covering all starting states and transitions?
        - Does the flow signal identify all domain process exceptions?
        - Are trace signals covering the actual system path, not the happy path?
      simplify:
        - Flow and trace are full by default -- developers need all 4 phases
        - A trace that skips a system boundary is not a trace
    expertise:
      depth: >
        Dataverse plugin pipeline, Power Platform connectors, backend service
        integration, state machine design, hand-compilation methodology.
      relevance: >
        Developer signals drive flow and trace. The quality of hand-compiled
        expected outputs determines the quality of implementation.

state:
  fields:
    - { name: initialized, type: boolean, default: false }
    - { name: topics_registered, type: number, default: 0 }
    - { name: signals_produced, type: number, default: 0 }
  version: 1
